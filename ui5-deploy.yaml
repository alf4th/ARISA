# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zdelivuptime.delivuptimelabelqr
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://my424750.s4hana.cloud.sap/
          authenticationType: reentranceTicket # SAML support for vscode
        app:
          name: ZDELIVUPTIME
          description: Update Timestamp & Generate Label QR
          package: ZCUST_APP_021
          transport: TVJK901058
        exclude:
          - /test/
